<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nextel Connect - Registration</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f8;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.1);
}

.logo{
    text-align:center;
    color:#005b46;
    font-size:32px;
    font-weight:bold;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    color:#333;
    font-weight:bold;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

input:focus{
    outline:none;
    border-color:#005b46;
}

.checkbox{
    display:flex;
    align-items:flex-start;
    gap:10px;
    margin:20px 0;
    color:#555;
    font-size:14px;
}

.checkbox input{
    width:auto;
    margin-top:3px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#005b46;
    color:#fff;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00735a;
}

.login{
    text-align:center;
    margin-top:20px;
}

.login a{
    color:#005b46;
    text-decoration:none;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<div class="logo">Nextel Connect</div>

<p class="subtitle">
Create your account to start earning rewards.
</p>

<div class="input-group">
<label>Full Name</label>
<input type="text" id="name">
</div>

<div class="input-group">
<label>Email Address</label>
<input type="email" id="email">
</div>

<div class="input-group">
<label>Phone Number</label>
<input type="tel" id="phone">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password">
</div>

<div class="input-group">
<label>Confirm Password</label>
<input type="password" id="confirm">
</div>

<div class="input-group">
<label>Referral Code (Optional)</label>
<input type="text" id="referral">
</div>

<div class="checkbox">
<input type="checkbox" id="terms">
<label for="terms">
I agree to the Terms of Service and Privacy Policy.
</label>
</div>

<button onclick="register()">
Create Account
</button>

<div class="login">
Already have an account?
<a href="login.html">Login</a>
</div>

</div>

<script>

function register(){

let name=document.getElementById("name").value.trim();
let email=document.getElementById("email").value.trim();
let phone=document.getElementById("phone").value.trim();
let password=document.getElementById("password").value;
let confirm=document.getElementById("confirm").value;
let terms=document.getElementById("terms").checked;

if(name=="" || email=="" || phone=="" || password=="" || confirm==""){
alert("Please fill in all required fields.");
return;
}

if(password!==confirm){
alert("Passwords do not match.");
return;
}

if(!terms){
alert("Please agree to the Terms of Service.");
return;
}

// Open your external link
window.location.href="https://YOUR-EXTERNAL-LINK.com";

}

</script>

</body>
</html>
